    function scanWifi(){
      window._wifiScanned=true;
      var list=$('wifiScanList');
      var status=$('wifiScanStatus');
      list.classList.remove('collapsed');
      $('scanChevron').classList.remove('collapsed');
      status.style.display='';
      status.textContent='Scanning for networks...';
      var rows=list.querySelectorAll('.wifi-scan-row');
      for(var i=0;i<rows.length;i++) rows[i].remove();
      var old=$('wifiScanFooter');if(old)old.remove();
      fetch('/api/wifi/scan').then(function(r){return r.json()}).then(function(data){
        renderScanResults(data);
      }).catch(function(e){
        status.textContent='Scan failed. Try again.';
        status.style.display='';
      });
    }

    function renderScanResults(data){
      var list=$('wifiScanList');
      var status=$('wifiScanStatus');
      var rows=list.querySelectorAll('.wifi-scan-row');
      for(var i=0;i<rows.length;i++) rows[i].remove();
      var old=$('wifiScanFooter');if(old)old.remove();
      if(!data.networks||data.networks.length===0){
        status.textContent='No networks found.';
        status.style.display='';
        return;
      }
      status.style.display='none';
      for(var i=0;i<data.networks.length;i++){
        var n=data.networks[i];
        var row=document.createElement('div');
        row.className='wifi-scan-row'+(n.compatible?'':' incompatible');
        var bars=getSignalBars(n.rssi,n.compatible);
        var left='<div class="wifi-scan-row-left">'+bars+'<div><div class="wifi-scan-ssid">'+escHtml(n.ssid)+'</div><div class="wifi-scan-meta">'+escHtml(n.auth)+' &middot; Ch '+n.channel+' &middot; '+n.rssi+' dBm</div></div></div>';
        if(n.compatible){
          row.innerHTML=left;
          var btn=document.createElement('button');
          btn.className='wifi-scan-select';
          btn.textContent='Select';
          (function(ssid){btn.addEventListener('click',function(){selectNetwork(ssid)})})(n.ssid);
          row.appendChild(btn);
        }else{
          row.innerHTML=left+'<span class="wifi-scan-badge">INCOMPATIBLE</span>';
        }
        list.appendChild(row);
      }
      var footer=document.createElement('div');
      footer.className='wifi-scan-footer';
      footer.id='wifiScanFooter';
      var txt=data.count+' network'+(data.count!==1?'s':'')+' found';
      if(data.incompatible_count>0) txt+=' &middot; '+data.incompatible_count+' incompatible';
      footer.innerHTML=txt;
      list.appendChild(footer);
    }

    function getSignalBars(rssi,compatible){
      var bars=rssi>=-50?4:rssi>=-70?3:2;
      var color=!compatible?'#666':bars>=4?'#4caf50':bars>=3?'#ff9800':'#f44336';
      var inactive='rgba(255,255,255,0.15)';
      var heights=[4,8,12,16];
      var html='<div class="wifi-scan-signal">';
      for(var i=0;i<4;i++){
        html+='<span style="height:'+heights[i]+'px;background:'+(i<bars?color:inactive)+'"></span>';
      }
      return html+'</div>';
    }

    function selectNetwork(ssid){
      var slots=['ssid1','ssid2','ssid3'];
      var target=null;
      for(var i=0;i<slots.length;i++){
        if(!$(slots[i]).value.trim()){target=i;break;}
      }
      if(target===null) target=2;
      $(slots[target]).value=ssid;
      $('pass'+(target+1)).value='';
      $('pass'+(target+1)).focus();
      checkDirty();
    }

    function toggleScanPanel(){
      var list=$('wifiScanList');
      var chev=$('scanChevron');
      list.classList.toggle('collapsed');
      chev.classList.toggle('collapsed');
      /* Scan lazily on the first unfurl of "Available Networks" (the ~4.7s scan
         is no longer fired on page load). Manual Rescan still works regardless. */
      if(!list.classList.contains('collapsed') && !window._wifiScanned && typeof scanWifi==='function') scanWifi();
    }

    function loadConfig(){
      /* Returns the chain so init can defer heavy startup work after populate.
         scanWifi() is no longer fired here; it runs lazily on first unfurl of the
         "Available Networks" panel. Forces a fresh GET (bypassing _cfgCache) since
         this is the authoritative load path -- initial page load and post-revert
         reload both need the server's current state, not a stale cached copy. */
      return fetchConfig(true).then(populateConfig).catch(e=>console.error('Failed to load config',e));
    }

    /* === Version Load === */
    function loadVersion(){
      /* P6d: tab-system (where the whole #fw_* grid lives) is now a lazily
         loaded fragment, so these elements may not exist yet the first time
         this runs (boot fires it unconditionally -- see Init below -- before
         the user has necessarily opened System). Every write is guarded;
         populateTab_system() calls this again once the fragment is present
         so the grid still ends up populated. */
      fetchJsonMemo('/api/version').then(data=>{
        if($('fw_version')) $('fw_version').textContent=data.version||'--';
        if($('fw_date')) $('fw_date').textContent=(data.date||'--')+' '+(data.time||'');
        if($('fw_idf')) $('fw_idf').textContent=data.idf||'--';
        if($('fw_partition')) $('fw_partition').textContent=data.partition||'--';

        var ghBase='https://github.com/chvvkumar/ESP32-P4-NINA-Display/';
        var tagEl=$('fw_git_tag');
        if(tagEl){
          tagEl.textContent='';
          var releaseTag=data.version?'v'+data.version:data.git_tag;
          if(releaseTag&&releaseTag!=='unknown'){
            var a=document.createElement('a');
            a.href=ghBase+'releases/tag/'+encodeURIComponent(releaseTag);
            a.target='_blank'; a.rel='noopener'; a.className='accent-link';
            a.textContent=releaseTag;
            tagEl.appendChild(a);
          }else{
            tagEl.textContent=releaseTag||'--';
          }
        }

        var shaEl=$('fw_git_sha');
        if(shaEl){
          shaEl.textContent='';
          if(data.git_sha&&data.git_sha!=='unknown'){
            var a=document.createElement('a');
            a.href=ghBase+'commit/'+encodeURIComponent(data.git_sha);
            a.target='_blank'; a.rel='noopener'; a.className='mono-link';
            a.textContent=data.git_sha.substring(0,8);
            shaEl.appendChild(a);
          }else{
            shaEl.textContent=data.git_sha||'--';
          }
        }
      }).catch(e=>console.error('Failed to load version',e));
    }

    /* === Toast === */
    function showToast(msg,type){
      var t=$('toast');
      t.textContent=msg;
      t.className='toast '+(type||'')+' show';
      clearTimeout(t._timer);
      t._timer=setTimeout(()=>{t.classList.remove('show');},3000);

    /* === Save / Discard / Reboot / Reset === */
    function save(){
      var btn=$('saveBtn');
      btn.disabled=true; btn.textContent='Saving...';
      postJson('/api/config',getConfigData()).then(r=>{
        if(!r.ok) throw new Error('Save failed');
        return r.text();
      }).then(()=>{
        invalidateConfigCache();
        showToast('Settings saved','success');
        loadedConfig=JSON.stringify(getConfigData());
        $('saveBar').classList.remove('visible');
      }).catch(e=>{
        showToast('Save failed: '+e.message,'error');
      }).finally(()=>{
        btn.disabled=false; btn.textContent='Save';
      });
    }

    function reloadConfig(){
      fetch('/api/config/revert',{method:'POST'}).then(r=>{
        if(!r.ok) throw new Error('Revert failed');
        invalidateConfigCache();
        loadConfig();
        $('saveBar').classList.remove('visible');
      }).catch(e=>showToast('Discard failed: '+e.message,'error'));
    }

    function saveAndReboot(){
      if(!confirm('Apply changes and reboot now?')) return;
      postJson('/api/config',getConfigData()).then(r=>{
        if(!r.ok) throw new Error('Save failed');
        invalidateConfigCache();
        return fetch('/api/reboot',{method:'POST'});
      }).then(()=>{
        showToast('Rebooting...','success');
      }).catch(e=>{
        showToast('Error: '+e.message,'error');
      });
    }

    function saveAuthEnabled(){
      var cb=$('auth_enabled');
      var status=$('auth_enabled_status');
      if(!cb) return;
      if(status){ status.textContent=''; status.style.color=''; }
      var want = !!cb.checked;
      if(!want){
        if(!confirm('Disable authentication?\n\nAnyone on your network will be able to reboot, reconfigure, and update this device. Secrets will remain redacted.\n\nContinue?')){
          cb.checked = true;
          return;
        }
      }
      fetch('/api/config',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({auth_enabled:want})
      }).then(function(r){
        if(!r.ok) throw new Error('HTTP '+r.status);
        invalidateConfigCache();
        if(status){
          status.textContent = want ? 'Authentication enabled.' : 'Authentication disabled.';
          status.style.color = '#6c6';
        }
        if($('signOutBtn')) $('signOutBtn').style.display = want ? '' : 'none';
        showToast(want ? 'Authentication enabled' : 'Authentication disabled','success');
      }).catch(function(e){
        if(status){ status.textContent='Save failed: '+e.message; status.style.color='#f66'; }
        showToast('Save failed: '+e.message,'error');
      });
    }

    function signOut(){
      fetch('/api/logout',{method:'POST'}).then(function(){
        window.location='/login';
      }).catch(function(){
        window.location='/login';

    /* Global fetch wrapper: redirect to /login on any 401 from protected APIs. */
    (function(){
      var _fetch=window.fetch;
      window.fetch=function(input,init){
        var url='';
        try{ url=(typeof input==='string')?input:(input&&input.url)||''; }catch(e){}
        return _fetch.call(this,input,init).then(function(resp){
          if(resp && resp.status===401 && url.indexOf('/api/login')===-1){
            window.location='/login';
          }
          return resp;
        });
      };
    })();

    function changeAdminPassword(){
      var cur=$('admin_pw_current').value;
      var nw=$('admin_pw_new').value;
      var cf=$('admin_pw_confirm').value;
      var status=$('admin_pw_status');
      status.textContent='';
      if(!cur){ status.textContent='Enter current password.'; status.style.color='#f66'; return; }
      if(nw.length<4||nw.length>32){ status.textContent='New password must be 4-32 characters.'; status.style.color='#f66'; return; }
      if(nw!==cf){ status.textContent='New passwords do not match.'; status.style.color='#f66'; return; }
      fetch('/api/admin-password',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({current:cur, new:nw})
      }).then(r=>r.json().then(j=>({ok:r.ok,status:r.status,body:j}))).then(res=>{
        if(res.ok){
          status.textContent='Password updated. Existing session remains active; new sign-ins require the new password.';
          status.style.color='#6c6';
          $('admin_pw_current').value='';
          $('admin_pw_new').value='';
          $('admin_pw_confirm').value='';
          showToast('Admin password updated','success');
        }else{

    /* Build the manual-update (full-erase) caution copy as HTML.
       `data` is a /api/check-update-json response; `tag` is substituted live. */
    function fullEraseCautionHtml(data){
      var tag=escHtml((data&&data.tag)||'');
      var eraseTag=escHtml((data&&data.full_erase_tag)||'');
      var relUrl=(data&&(data.release_url||data.html_url))||'https://github.com/chvvkumar/ESP32-P4-NINA-Display/releases';
      relUrl=escHtml(relUrl);
      // Name the intermediate release that forces the manual update when it differs
      // from the target. Empty eraseTag (history-incomplete fail-safe) or eraseTag
      // equal to the target keeps the existing single-version wording.
      var lead;
      if(eraseTag && eraseTag!==tag){
        lead='Updating to <strong>'+tag+'</strong> requires a manual update, because release <strong>'+eraseTag+'</strong> on the way requires a full erase. It cannot be installed over the air. ';
      } else {
        lead='Firmware <strong>'+tag+'</strong> requires a manual update. It cannot be installed over the air. ';
      }
      return lead+
        'First back up your settings on the Backup tab (Download Backup). '+
        'Then flash nina-display-factory.bin at address 0x0000 using the '+
        '<a href="https://espressif.github.io/esptool-js/" target="_blank" rel="noopener">ESP Web Flasher</a>. '+
        '<a href="'+relUrl+'" target="_blank" rel="noopener">View release</a>.';
    }

    /* === Live nav metrics (polls /api/status every 5s) === */
    function navMetricBars(rssi){
      var bars=rssi>=-50?4:rssi>=-60?3:rssi>=-70?2:1;
      var color=bars>=3?'#4caf50':bars>=2?'#ff9800':'#f44336';
      var inactive='rgba(255,255,255,0.15)';
      var heights=[8,13,17,22];
      var html='';
      for(var i=0;i<4;i++){
        html+='<span style="height:'+heights[i]+'px;background:'+(i<bars?color:inactive)+'"></span>';
      }
      return html;
    }
    function humanizeUptime(ms){
      if(!ms||ms<0) return '--';
      var s=Math.floor(ms/1000);
      var d=Math.floor(s/86400); s-=d*86400;
      var h=Math.floor(s/3600);  s-=h*3600;
      var m=Math.floor(s/60);
      if(d>0) return d+'d '+h+'h';
      if(h>0) return h+'h '+m+'m';
      if(m>0) return m+'m';
      return '<1m';
    }
    function refreshNavMetrics(){
      fetchJsonMemo('/api/status').then(function(d){
        if(!d) return;
        // Temperature (1 decimal, null -> --)
        var t=$('mTemp');
        if(t) t.textContent=(typeof d.temperature_c==='number')?(d.temperature_c.toFixed(1)+'°'):'--';
        // Uptime, humanized
        var up=$('mUptime');
        if(up) up.textContent=humanizeUptime(d.uptime_ms);
        // Internal heap: used % on the chip, actual free/total (KB) on hover.
        // Use heap_internal_free (MALLOC_CAP_INTERNAL) so it matches heap_total
        // (internal); heap_free counts all regions incl. PSRAM and would skew it.
        var mem=$('mMem');
        if(mem){
          if(typeof d.heap_internal_free==='number'&&typeof d.heap_total==='number'&&d.heap_total>0){
            var heapUsed=Math.round((d.heap_total-d.heap_internal_free)/d.heap_total*100);
            mem.textContent=heapUsed+'%';
            mem.closest('.sys-metric').title='Internal heap: '+Math.round(d.heap_internal_free/1024)+'K free / '+Math.round(d.heap_total/1024)+'K total ('+heapUsed+'% used)';
          }else{
            mem.textContent='--';
            mem.closest('.sys-metric').title='Free internal heap';
          }
        }
        // PSRAM: used % on the chip, actual free/total (MB) on hover
        var ps=$('mPsram');
        if(ps){
          if(typeof d.psram_free==='number'&&typeof d.psram_total==='number'&&d.psram_total>0){
            var psUsed=Math.round((d.psram_total-d.psram_free)/d.psram_total*100);
            ps.textContent=psUsed+'%';
            ps.closest('.sys-metric').title='PSRAM: '+(d.psram_free/1048576).toFixed(1)+'M free / '+(d.psram_total/1048576).toFixed(1)+'M total ('+psUsed+'% used)';
          }else{
            ps.textContent='--';
            ps.closest('.sys-metric').title='Free PSRAM';
          }
        }
        // WiFi: RSSI dBm + signal bars
        var w=$('mWifi'), wb=$('mWifiBars');
        if(typeof d.wifi_rssi==='number'){
          if(w) w.textContent=d.wifi_rssi+'dBm';
          if(wb) wb.innerHTML=navMetricBars(d.wifi_rssi);
        }else{
          if(w) w.textContent='--';
          if(wb) wb.innerHTML=navMetricBars(-100);
        }
      }).catch(function(){ /* keep last values */ });
    }

    function clGrabSection(body, prefixLower){
      // prefixLower e.g. '### summary' or '### changes since'
      var lower=body.toLowerCase();
      var idx=lower.indexOf(prefixLower);
      if(idx===-1) return null;
      var nl=body.indexOf('\n', idx);
      var titleLine, contentStart;
      if(nl===-1){ titleLine=body.slice(idx); contentStart=body.length; }
      else { titleLine=body.slice(idx, nl); contentStart=nl+1; }
      titleLine=titleLine.replace(/^#+\s*/,'').replace(/\s+$/,'');
      var a=body.indexOf('\n### ', contentStart);
      var b=body.indexOf('\n## ', contentStart);
      var end=body.length;
      if(a!==-1&&a<end) end=a;
      if(b!==-1&&b<end) end=b;
      var content=body.slice(contentStart, end).replace(/^\s+|\s+$/g,'');
      return {title:titleLine, content:content};
    }

    function loadChangelog(){
      /* update_channel is a System-tab field. openChangelogModal() (this
         function's only caller) is reachable from the global updatePill
         badge in the top nav, which is wired at parse time and visible on
         any tab (see checkUpdateBadge()) -- so System may never have been
         opened this session. Fall back to the cached server config. */
      var channel=$('update_channel')?(parseInt($('update_channel').value)||0):(_cfgCache&&_cfgCache.update_channel!=null?_cfgCache.update_channel:0);
      fetch('https://api.github.com/repos/chvvkumar/ESP32-P4-NINA-Display/releases?per_page=30')
        .then(function(r){return r.json();})
        .then(function(releases){
          if(!Array.isArray(releases)) throw new Error('bad response');
          var html='';
          var count=0;
          for(var i=0;i<releases.length;i++){
            var rel=releases[i];
            if(rel.draft===true) continue;
            var isPre=rel.prerelease===true;
            if(channel===2){ if(rel.tag_name!=='snd-alpha') continue; }  // alpha channel: only the snd-alpha rolling release
            else if(channel===1){ if(!isPre || rel.tag_name==='snd-alpha') continue; }  // pre-release channel: pre-releases except snd-alpha
            else { if(isPre) continue; }              // stable channel: only stable releases
            if(rel.tag_name===_updateInfo.current_version) break;
            if(count>=20) break;
            var head=escHtml(rel.tag_name);
            if(rel.prerelease) head+=' <span class="cl-prerelease">pre-release</span>';
            var rawBody=(rel.body||'').replace(/!\[[^\]]*\]\([^)]*\)/g,'');
            html+='<div class="cl-version">'+head+'</div>';
            var secs=[];
            var s1=clGrabSection(rawBody,'### summary');
            var s2=clGrabSection(rawBody,'### changes since');
            if(s1) secs.push(s1);
            if(s2) secs.push(s2);
            if(secs.length){
              for(var s=0;s<secs.length;s++){
                html+='<div class="cl-section-title">'+escHtml(secs[s].title)+'</div>';
                html+='<div class="cl-notes">'+escHtml(secs[s].content)+'</div>';
              }
            } else {
              html+='<div class="cl-notes">No summary available.</div>';
            }
            count++;
          }
          if(!count) html='<div class="cl-notes">No release notes found.</div>';
          $('changelogBody').innerHTML=html;
        })
        .catch(function(){
          $('changelogBody').innerHTML='<div class="cl-notes">Could not load changelog. '+
            '<a href="https://github.com/chvvkumar/ESP32-P4-NINA-Display/releases" target="_blank" rel="noopener" style="color:var(--accent)">View releases on GitHub</a></div>';
        });
    }

    function startOta(){
      var fileInput=$('otaFile');
      if(!fileInput.files.length) return;
      if(!confirm('Flash new firmware? The device will reboot after update.')) return;
      var file=fileInput.files[0];
      var progressDiv=$('otaProgress');
      var fill=$('otaProgressFill');
      var status=$('otaStatus');
      var btn=$('otaBtn');
      progressDiv.style.display='block';
      btn.disabled=true;
      fill.style.width='0%';
      status.textContent='Uploading...';
      var xhr=new XMLHttpRequest();
      xhr.open('POST','/api/ota',true);
      xhr.setRequestHeader('Content-Type','application/octet-stream');
      xhr.upload.addEventListener('progress',function(e){
        if(e.lengthComputable){
          var pct=Math.round((e.loaded/e.total)*100);
          fill.style.width=pct+'%';
          status.textContent='Uploading... '+pct+'%';
        }
      });
      xhr.addEventListener('load',function(){
        if(xhr.status>=200&&xhr.status<300){
          fill.style.width='100%';
          status.textContent='Update complete! Rebooting...';
          showToast('Firmware updated. Rebooting...','success');
        }else{
          status.textContent='Update failed (HTTP '+xhr.status+')';
          showToast('OTA failed','error');
          btn.disabled=false;
        }
      });
      xhr.addEventListener('error',function(){
        status.textContent='Upload error';
        showToast('OTA upload error','error');
        btn.disabled=false;
      });
      xhr.send(file);
    }

    function generateRandomString(length){
      var possible='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      var values=crypto.getRandomValues(new Uint8Array(length));
      return Array.from(values).map(function(x){return possible[x%possible.length]}).join('');
    }

    /* Pure-JS SHA-256 — works over plain HTTP (no crypto.subtle needed) */
    function sha256(plain){
      function rr(v,n){return(v>>>n)|(v<<(32-n))}
      var K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
        0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
        0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
        0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
        0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
        0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
        0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
        0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
      var H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
      var enc=new TextEncoder(),bytes=enc.encode(plain),bl=bytes.length*8;
      var pad=new Uint8Array(((bytes.length+9+63)&~63));
      pad.set(bytes);pad[bytes.length]=0x80;
      var dv=new DataView(pad.buffer);dv.setUint32(pad.length-4,bl,false);
      for(var off=0;off<pad.length;off+=64){
        var W=new Array(64),i;
        for(i=0;i<16;i++)W[i]=dv.getUint32(off+i*4,false);
        for(i=16;i<64;i++){var s0=rr(W[i-15],7)^rr(W[i-15],18)^(W[i-15]>>>3),s1=rr(W[i-2],17)^rr(W[i-2],19)^(W[i-2]>>>10);W[i]=(W[i-16]+s0+W[i-7]+s1)|0;}
        var a=H[0],b=H[1],c=H[2],d=H[3],e=H[4],f=H[5],g=H[6],h=H[7];
        for(i=0;i<64;i++){var S1=rr(e,6)^rr(e,11)^rr(e,25),ch=(e&f)^(~e&g),t1=(h+S1+ch+K[i]+W[i])|0,S0=rr(a,2)^rr(a,13)^rr(a,22),mj=(a&b)^(a&c)^(b&c),t2=(S0+mj)|0;h=g;g=f;f=e;e=(d+t1)|0;d=c;c=b;b=a;a=(t1+t2)|0;}
        H[0]=(H[0]+a)|0;H[1]=(H[1]+b)|0;H[2]=(H[2]+c)|0;H[3]=(H[3]+d)|0;H[4]=(H[4]+e)|0;H[5]=(H[5]+f)|0;H[6]=(H[6]+g)|0;H[7]=(H[7]+h)|0;
      }
      var out=new Uint8Array(32);var ov=new DataView(out.buffer);
      for(var j=0;j<8;j++)ov.setUint32(j*4,H[j],false);
      return Promise.resolve(out.buffer);
    }

    function base64urlencode(arrayBuffer){
      var str=String.fromCharCode.apply(null,new Uint8Array(arrayBuffer));
      return btoa(str).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    }

    function spotifyLogin(){
      var clientId=$('spotifyClientId').value.trim();
      if(!clientId){showToast('Enter a Client ID first','error');return;}
      /* Auto-save client ID to device so token exchange can find it */
      fetch('/api/spotify/config',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({spotify_client_id:clientId,spotify_enabled:true})});
      var codeVerifier=generateRandomString(128);
      sessionStorage.setItem('spotify_code_verifier',codeVerifier);
      /* Use http://127.0.0.1:8000/callback — Spotify allows http for loopback IPs.
       * After auth, Spotify redirects to 127.0.0.1 which won't load — user pastes
       * the resulting URL back here so we can extract the auth code. */
      var redirectUri='http://127.0.0.1:8000/callback';
      sessionStorage.setItem('spotify_redirect_uri',redirectUri);
      sha256(codeVerifier).then(function(hashed){
        var codeChallenge=base64urlencode(hashed);
        var scopes='user-read-currently-playing user-read-playback-state user-modify-playback-state';
        var state=generateRandomString(16);
        sessionStorage.setItem('spotify_auth_state',state);
        var params=new URLSearchParams({
          response_type:'code',
          client_id:clientId,
          scope:scopes,
          redirect_uri:redirectUri,
          state:state,
          code_challenge_method:'S256',
          code_challenge:codeChallenge
        });
        window.open('https://accounts.spotify.com/authorize?'+params.toString(),'_blank');
        /* Show the paste-URL field */
        var pasteDiv=$('spotifyPasteDiv');
        if(pasteDiv) pasteDiv.style.display='block';
      });
    }
    function spotifySubmitCallback(){
      var urlStr=$('spotifyPasteUrl').value.trim();
      if(!urlStr){showToast('Paste the redirect URL first','error');return;}
      try{
        var u=new URL(urlStr);
        var code=u.searchParams.get('code');
        var cbState=u.searchParams.get('state');
        var error=u.searchParams.get('error');
        if(error){showToast('Spotify login denied: '+error,'error');return;}
        var savedState=sessionStorage.getItem('spotify_auth_state');
        if(cbState!==savedState){showToast('Auth state mismatch — please retry login','error');return;}
        if(!code){showToast('No auth code found in URL','error');return;}
        var cv=sessionStorage.getItem('spotify_code_verifier');
        var ru=sessionStorage.getItem('spotify_redirect_uri');
        $('spotifySubmitBtn').disabled=true;
        $('spotifySubmitBtn').textContent='Connecting...';
        fetch('/api/spotify/token-exchange',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({code:code,code_verifier:cv,redirect_uri:ru})
        }).then(function(r){return r.json()})
          .then(function(j){
            $('spotifySubmitBtn').disabled=false;
            $('spotifySubmitBtn').textContent='Submit';
            if(j.success){
              showToast('Spotify connected!','success');
              updateSpotifyStatus();
              $('spotifyPasteDiv').style.display='none';
              $('spotifyPasteUrl').value='';
            } else showToast('Token exchange failed: '+(j.error||'unknown'),'error');
          }).catch(function(e){
            $('spotifySubmitBtn').disabled=false;
            $('spotifySubmitBtn').textContent='Submit';
            showToast('Login error: '+e.message,'error');
          });
        sessionStorage.removeItem('spotify_code_verifier');
        sessionStorage.removeItem('spotify_auth_state');
        sessionStorage.removeItem('spotify_redirect_uri');
      }catch(e){showToast('Invalid URL — paste the full address bar URL','error');}
    }

    function updateSpotifyStatus(){

        .then(function(data){
          var el=$('spotifyStatus');
          var loginBtn=$('spotifyLoginBtn');
          var logoutBtn=$('spotifyLogoutBtn');
          if(!el) return;
          if(data.auth_state==='authorized'){
            el.textContent='Connected';
            el.style.color='#10b981';
            if(loginBtn) loginBtn.style.display='none';
            if(logoutBtn) logoutBtn.style.display='';

            el.textContent='Error: '+(data.error||'Token refresh failed');
            el.style.color='#ef4444';

            if(logoutBtn) logoutBtn.style.display='';

            if(logoutBtn) logoutBtn.style.display='none';
          }

        .catch(function(){

              input.placeholder='e.g., data.cpu_temp';

                if(activeFieldInput) activeFieldInput.style.boxShadow='';
                activeFieldInput=this;
                this.style.boxShadow='0 0 0 2px rgba(59,130,246,0.4)';

              });
            } else if(inp==='title'||inp==='label'){
              input.placeholder=inp==='title'?'Display title':'Label';
            } else if(inp==='unit'||inp==='suffix'){
              input.placeholder=inp==='unit'?'\u00b0C, %, etc.':'suffix';

              wrap.style.minWidth='60px';

    function gatherAllSkyThresholds(){
      var result={};
      allskyFieldDefs.forEach(function(quadDef){
        quadDef.fields.forEach(function(f){
          if(!hasColorInputs(f)) return;
          var thrKey=quadDef.quad+'_'+f.key;
          var elMin=$('as_thr_'+thrKey+'_min');
          var elMax=$('as_thr_'+thrKey+'_max');
          if(!elMin||!elMax) return;
          var mn=elMin.value,mx=elMax.value;
          if(mn===''&&mx==='') return;
          result[thrKey]={
            min:parseFloat(mn)||0,
            max:parseFloat(mx)||0,
            color_min:$('as_thr_'+thrKey+'_minc').value,
            color_max:$('as_thr_'+thrKey+'_maxc').value
          };
        });
      });
      return result;
    }

    function gatherAllSkyFieldMappings(){
      var config={};
      allskyFieldDefs.forEach(function(quadDef){
        var qData={};
        quadDef.fields.forEach(function(f){
          var fieldId='as_fm_'+quadDef.quad+'_'+f.key;
          var fData={};
          var hasData=false;
          f.inputs.forEach(function(inp){
            var el=$(fieldId+'_'+inp);
            if(el&&el.value.trim()){
              fData[inp]=el.value.trim();
              hasData=true;
            }
          });
          if(hasData) qData[f.key]=fData;
        });
        if(Object.keys(qData).length>0) config[quadDef.quad]=qData;
      });
      return config;
    }

       session. Fall back to the cached server config (whichever of
       weather_lat/lon or the older moon_lat/lon key is present) instead of
       silently reading null.value and throwing, or resetting the moon
       position to 0,0 on every apply. */
    function currentMoonLat(){
      if($('weather_lat')) return parseFloat($('weather_lat').value)||0;
      if(_cfgCache){
        if(_cfgCache.weather_lat!=null) return _cfgCache.weather_lat;
        if(_cfgCache.moon_lat!=null) return _cfgCache.moon_lat;
      }
      return 0;

      if(_cfgCache){
        if(_cfgCache.weather_lon!=null) return _cfgCache.weather_lon;

      return 0;
    }

    function renderJsonTree(obj,prefix){
      var html='';
      for(var key in obj){
        if(!obj.hasOwnProperty(key)) continue;
        var path=prefix?prefix+'.'+key:key;
        var val=obj[key];
        if(val!==null&&typeof val==='object'&&!Array.isArray(val)){
          html+='<details><summary style="cursor:pointer;color:#93c5fd;padding:2px 0;user-select:none">'+escHtml(key)+'</summary>';
          html+='<div style="padding-left:16px;border-left:1px solid rgba(255,255,255,0.06)">'+renderJsonTree(val,path)+'</div></details>';
        } else {
          var escapedPath=path.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
          html+='<div style="padding:3px 0;display:flex;justify-content:space-between;align-items:center;gap:8px">';
          html+='<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><span style="color:#d1d5db">'+escHtml(key)+'</span><span style="color:#71717a">: </span><span style="color:#fbbf24">'+escHtml(JSON.stringify(val))+'</span></span>';
          html+='<button onclick="selectJsonKey(\''+escapedPath+'\')" style="flex-shrink:0;font-size:0.6rem;padding:2px 10px;background:rgba(59,130,246,0.2);border:1px solid rgba(59,130,246,0.35);border-radius:4px;color:#93c5fd;cursor:pointer;font-family:inherit;transition:background 0.15s" onmouseover="this.style.background=\'rgba(59,130,246,0.35)\'" onmouseout="this.style.background=\'rgba(59,130,246,0.2)\'">Use</button>';
          html+='</div>';
        }
      }
      return html;
    }

    function escHtml(s){
      var d=document.createElement('div');
      d.textContent=s;
      return d.innerHTML;
    }

    function selectJsonKey(path){
      if(activeFieldInput){
        activeFieldInput.value=path;
        activeFieldInput.style.borderColor='#22c55e';
        activeFieldInput.style.boxShadow='0 0 0 2px rgba(34,197,94,0.3)';
        setTimeout(function(){
          activeFieldInput.style.borderColor='';
          activeFieldInput.style.boxShadow='';
        },1500);
      } else {
        showToast('Click a key path input field first, then click Use on a JSON value','info');
      }
    }

    /* === Collapsible Cards === */
    function getCardKey(card){
      var title=card.querySelector('.card-title');
      if(!title) return null;
      var tab=card.closest('.tab-panel');
      var tabId=tab?tab.id:'unknown';
      var text=title.textContent.trim().replace(/\s+/g,'_').substring(0,40);
      return 'nina_collapse_'+tabId+'_'+text;
    }

    function toggleHelp(e, btn){
      if(e) e.stopPropagation();
      var ct = btn.closest('.card-title');
      if(!ct) return;
      var pop = ct.nextElementSibling;
      if(pop && pop.classList.contains('help-popover')) pop.classList.toggle('open');
    }

    function initCollapsibleCards(root){
      /* root scopes the scan to one just-injected fragment (see
         loadTabFragment) so re-running this after a lazy tab loads does not
         re-attach a second click listener to cards from tabs already wired
         at initial page load. Defaults to the whole document for the
         original startup call below. */
      var saved={};
      try{ saved=JSON.parse(localStorage.getItem('nina_collapse_state')||'{}'); }catch(e){}
      (root||document).querySelectorAll('.card').forEach(function(card){
        var title=card.querySelector('.card-title');
        if(!title) return;
        if(card.classList.contains('nocollapse')) return;  // always-expanded cards (e.g. Logs)
        var key=getCardKey(card);
        if(!key) return;
        // Appearance and Page Navigation default to expanded; others default to collapsed
        var defaultExpanded = /Appearance|Page_Navigation/.test(key);
        if(saved[key]==='expanded' || (defaultExpanded && saved[key]!=='collapsed'))
          card.classList.remove('collapsed');
        else card.classList.add('collapsed');
        title.addEventListener('click',function(e){
          // Don't toggle if clicking interactive elements inside title
          if(e.target.tagName==='SELECT'||e.target.tagName==='INPUT'||e.target.tagName==='BUTTON') return;
          card.classList.toggle('collapsed');
          saveCollapseState();
        });
      });
    }

    function saveCollapseState(){
      var state={};
      document.querySelectorAll('.card').forEach(function(card){
        var key=getCardKey(card);
        if(!key) return;
        state[key]=card.classList.contains('collapsed')?'collapsed':'expanded';
      });
      try{ localStorage.setItem('nina_collapse_state',JSON.stringify(state)); }catch(e){}
    }

    /* === API documentation: live host injection + copy helper === */
    function apiInjectHost(){
      var host=window.location.host||'HOST';
      // Replace visible HOST placeholders in example URLs.
      $$('.api-host').forEach(function(el){ el.textContent=host; });
      var lbl=$('apiHostLabel');
      if(lbl) lbl.textContent=host;
      // Rewrite the data-curl source used by the copy button.
      $$('.api-snip[data-curl]').forEach(function(el){
        if(!el.dataset.curlBase) el.dataset.curlBase=el.dataset.curl;
        el.dataset.curl=el.dataset.curlBase.split('HOST').join(host);
      });
    }

    function apiCopy(btn){
      var snip=btn.closest('.api-snip');
      if(!snip) return;
      var text=snip.dataset.curl;
      if(!text){
        var pre=snip.querySelector('pre');
        text=pre?pre.textContent:'';
      }
      var done=function(){
        var prev=btn.textContent;
        btn.textContent='Copied';
        btn.classList.add('copied');
        setTimeout(function(){ btn.textContent=prev; btn.classList.remove('copied'); },1500);
      };
      if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(done).catch(function(){ apiCopyFallback(text,done); });
      } else {
        apiCopyFallback(text,done);
      }
    }

    function apiCopyFallback(text,done){
      try{
        var ta=document.createElement('textarea');
        ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        done();
      }catch(e){}
    }

    apiInjectHost();
    initCollapsibleCards();

    /* ---- Diagnostic Logs ---- */

    var _logsTimer=null;
    var activeLogSource='device';

    function logsTabActive(){
      var p=$('tab-logs');
      return !!(p && p.classList.contains('active'));
    }

    /* Bytes of log tail shown in the viewer; Download still serves the full log. */
    var LOGS_TAIL_BYTES=32768;

    /* Hint text per source (no em dashes in user-facing strings). */
    var LOG_HINTS={
      device:'Console output captured since boot (kept in memory; oldest lines drop off as new ones arrive). The viewer shows the most recent output; use Download for the full log.',
      crash:'Saved crash history (survives reboot). Records unexpected restarts and crashes, with details when available. Newest 20 records kept.'
    };

    /* Switch the unified Logs card between the device and crash sources. Toggles
       segment buttons, viewports, control groups, status lines, hint, the shared
       Download href, and refreshes the now-active source. */
    function setLogSource(src){
      if(src!=='crash') src='device';
      activeLogSource=src;
      var dev=(src==='device');

      var segDev=$('logSegDevice'), segCrash=$('logSegCrash');
      if(segDev) segDev.classList.toggle('active',dev);
      if(segCrash) segCrash.classList.toggle('active',!dev);

      var lv=$('logsView'), cv=$('crashlogView');
      if(lv) lv.classList.toggle('hidden',!dev);
      if(cv) cv.classList.toggle('hidden',dev);

      var devCtl=$('logsDeviceCtl'), crashCtl=$('logsCrashCtl');
      if(devCtl) devCtl.style.display=dev?'flex':'none';
      if(crashCtl) crashCtl.style.display=dev?'none':'flex';

      var ls=$('logsStatus'), cs=$('crashlogStatus');
      if(ls) ls.style.display=dev?'':'none';
      if(cs) cs.style.display=dev?'none':'';

      var hint=$('logsHint');
      if(hint) hint.textContent=LOG_HINTS[src];

      var dl=$('logsDownloadLink');
      if(dl) dl.href=dev?'/api/logs':'/api/crashlog';

      /* Core dump card is only relevant alongside crash history. */
      var cd=$('coredumpCard');
      if(cd) cd.style.display='none';

      /* Auto-refresh only applies to the device source. */
      if(dev){ syncLogsAutoRefresh(); refreshLogs(); }
      else { stopLogsAutoRefresh(); refreshCrashlog(); if(typeof refreshCoredumpInfo==='function') refreshCoredumpInfo(); }
    }

    /* Shared toolbar buttons route to the active source. */
    function logsRefreshActive(){
      if(activeLogSource==='crash') refreshCrashlog(); else refreshLogs();
    }
    function logsClearActive(){
      if(activeLogSource==='crash') clearCrashlog(); else clearLogs();
    }

    function refreshLogs(){
      var view=$('logsView');
      if(!view) return;
      var btn=(activeLogSource==='device')?$('logsRefreshBtn'):null;
      if(btn) btn.disabled=true;
      /* Was the view scrolled to (near) the bottom before we replaced content? */
      var nearBottom = (view.scrollHeight - view.scrollTop - view.clientHeight) < 40;
      /* Viewer shows only the newest slice of the buffer; pulling the whole
         512 KB capture every refresh starved the device's web server. The
         Download link (see setLogSource) still fetches the full log. */
      fetch('/api/logs?tail='+LOGS_TAIL_BYTES)
        .then(function(r){
          if(!r.ok) throw new Error('HTTP '+r.status);
          return r.text();
        })
        .then(function(text){
          view.textContent=text;
          if(nearBottom) view.scrollTop=view.scrollHeight;
          var kb=(text.length/1024).toFixed(1);
          $('logsStatus').textContent='Updated '+new Date().toLocaleTimeString()+' · '+text.length+' bytes ('+kb+' KB)';
        })
        .catch(function(e){
          showToast('Load logs failed: '+e.message,'error');
          $('logsStatus').textContent='Load failed at '+new Date().toLocaleTimeString()+': '+e.message;
        })
        .finally(function(){ if(btn) btn.disabled=false; });
    }

    function logsAutoRefreshTick(){
      /* Skip polling when the tab is not visible, the document is hidden, or the
         crash source is showing, to avoid pulling the whole 512 KB buffer needlessly. */
      if(document.hidden || !logsTabActive() || activeLogSource!=='device') return;
      refreshLogs();
    }

    function startLogsAutoRefresh(){
      stopLogsAutoRefresh();
      var sel=$('logsRefreshInterval');
      var secs=sel?parseInt(sel.value,10):5;
      if(!secs||secs<1) secs=5;
      _logsTimer=setInterval(logsAutoRefreshTick,secs*1000);
    }

    function stopLogsAutoRefresh(){
      if(_logsTimer){ clearInterval(_logsTimer); _logsTimer=null; }
    }

    function syncLogsAutoRefresh(){
      var cb=$('logsAutoRefresh');
      if(cb && cb.checked) startLogsAutoRefresh();
      else stopLogsAutoRefresh();
    }

    /* Attaches the Logs tab's checkbox/select change listeners. Named (not a
       parse-time IIFE) because tab-logs is now a lazily-loaded fragment
       (P6b): the elements don't exist at script-parse time unless Logs is
       the tab restored from localStorage, and even then the fragment fetch
       is async. Called from populateTab_logs(), which already runs once the
       fragment's markup is guaranteed present (either via loadTabFragment's
       direct post-injection call, or via populateConfig()'s loadedTabs-gated
       loop) -- so this may run more than once across a session (e.g. every
       config reload); addEventListener with the same function reference is
       idempotent, so repeat calls do not attach duplicate listeners. */
    function wireLogsControls(){
      var cb=$('logsAutoRefresh');
      var sel=$('logsRefreshInterval');
      if(!cb && !sel) return;  // fragment not loaded yet
      if(cb) cb.addEventListener('change',syncLogsAutoRefresh);
      if(sel) sel.addEventListener('change',function(){
        /* Restart with the new interval only if auto-refresh is on. */
        if(cb && cb.checked) startLogsAutoRefresh();
      });
      /* If Logs is the active tab when this first runs, populate the default
         source now; switchTab() also does this on every Logs activation, so
         this is a harmless re-trigger when both fire close together. */
      if(logsTabActive()){ setLogSource('device'); }
    }

    /* Pause auto-refresh when the page is hidden; resume when visible on Logs tab. */
    document.addEventListener('visibilitychange',function(){
      if(document.hidden){ stopLogsAutoRefresh(); }
      else { syncLogsAutoRefresh(); }
    });

    function clearLogs(){
      if(!confirm('Clear the captured device logs? This cannot be undone.')) return;
      var btn=$('logsClearBtn');
      btn.disabled=true; var prev=btn.textContent; btn.textContent='Clearing...';
      fetch('/api/logs/clear',{method:'POST'})
        .then(function(r){
          if(!r.ok) throw new Error('Clear failed');
          showToast('Logs cleared','success');
          refreshLogs();
        })
        .catch(function(e){ showToast('Clear logs failed: '+e.message,'error'); })
        .finally(function(){ btn.disabled=false; btn.textContent=prev; });
    }

    /* ---- Crash Logs ---- */

    /* Format a crash record's timestamp: wall-clock when ts>0, else uptime note. */
    function crashWhen(rec){
      if(rec.ts && rec.ts>0){
        try{ return new Date(rec.ts*1000).toLocaleString(); }catch(e){}
        return 'ts '+rec.ts;
      }
      var u=(rec.uptime_s!=null)?rec.uptime_s:0;
      return 'uptime '+u+'s (no clock)';
    }

    /* Build one crash entry as DOM nodes (textContent avoids HTML injection from
       the captured panic text). */
    function buildCrashEntry(rec){
      var wrap=document.createElement('div');
      wrap.style.cssText='border:1px solid var(--border);border-radius:var(--radius-sm);'
        +'padding:10px 12px;margin-bottom:10px;background:rgba(0,0,0,0.25)';

      var head=document.createElement('div');
      head.style.cssText='display:flex;flex-wrap:wrap;gap:6px 14px;align-items:baseline;'
        +'font-family:inherit;color:var(--text)';

      var reason=document.createElement('strong');
      reason.textContent=rec.reason_str||('reason '+(rec.reason!=null?rec.reason:'?'));
      reason.style.cssText='font-size:0.82rem';
      head.appendChild(reason);

      var when=document.createElement('span');
      when.textContent=crashWhen(rec);
      when.style.cssText='color:var(--text-secondary);font-size:0.75rem';
      head.appendChild(when);

      var counts=document.createElement('span');
      var c=(rec.crash_count!=null)?rec.crash_count:'?';
      var b=(rec.boot_count!=null)?rec.boot_count:'?';
      counts.textContent='crash #'+c+' · boot #'+b;
      counts.style.cssText='color:var(--text-hint);font-size:0.72rem';
      head.appendChild(counts);

      wrap.appendChild(head);

      var panic=(rec.panic||'').trim();
      if(panic){
        var det=document.createElement('details');
        det.style.cssText='margin-top:6px';
        var sum=document.createElement('summary');
        sum.textContent='Panic text';
        sum.style.cssText='cursor:pointer;font-size:0.74rem;color:var(--text-secondary)';
        det.appendChild(sum);
        var pre=document.createElement('pre');
        pre.textContent=panic;
        pre.style.cssText='margin:6px 0 0;white-space:pre-wrap;word-break:break-word;'
          +'font-size:0.7rem;line-height:1.35;max-height:260px;overflow:auto;'
          +'color:var(--text-secondary)';
        det.appendChild(pre);
        wrap.appendChild(det);
      } else {
        var none=document.createElement('div');
        none.textContent='No panic text captured (reset-reason only).';
        none.style.cssText='margin-top:4px;font-size:0.72rem;color:var(--text-hint)';
        wrap.appendChild(none);
      }
      return wrap;
    }

    function refreshCrashlog(){
      var view=$('crashlogView');
      if(!view) return;
      var btn=(activeLogSource==='crash')?$('logsRefreshBtn'):null;
      if(btn) btn.disabled=true;
      fetch('/api/crashlog')
        .then(function(r){
          if(!r.ok) throw new Error('HTTP '+r.status);
          return r.text();
        })
        .then(function(text){
          view.textContent='';
          var lines=text.split('\n');
          var recs=[];
          for(var i=0;i<lines.length;i++){
            var ln=lines[i].trim();
            if(!ln) continue;
            try{ recs.push(JSON.parse(ln)); }catch(e){ /* skip malformed line */ }
          }
          if(recs.length===0){
            var empty=document.createElement('div');
            empty.textContent='No crashes recorded.';
            empty.style.cssText='color:var(--text-hint);font-size:0.8rem';
            view.appendChild(empty);
            $('crashlogStatus').textContent='Updated '+new Date().toLocaleTimeString()+' · 0 records';
            return;
          }
          /* Newest first for display (file is newest-last). */
          recs.reverse();
          recs.forEach(function(rec){ view.appendChild(buildCrashEntry(rec)); });
          $('crashlogStatus').textContent='Updated '+new Date().toLocaleTimeString()+' · '+recs.length+' record'+(recs.length===1?'':'s');
        })
        .catch(function(e){
          showToast('Load crash logs failed: '+e.message,'error');
          $('crashlogStatus').textContent='Load failed at '+new Date().toLocaleTimeString()+': '+e.message;
        })
        .finally(function(){ if(btn) btn.disabled=false; });
    }

    function clearCrashlog(){
      if(!confirm('Clear the crash history? This cannot be undone.')) return;
      var btn=$('logsClearBtn');
      btn.disabled=true; var prev=btn.textContent; btn.textContent='Clearing...';
      fetch('/api/crashlog/clear',{method:'POST'})
        .then(function(r){
          if(!r.ok) throw new Error('Clear failed');
          showToast('Crash logs cleared','success');
          refreshCrashlog();
        })
        .catch(function(e){ showToast('Clear crash logs failed: '+e.message,'error'); })
        .finally(function(){ btn.disabled=false; btn.textContent=prev; });
    }

    /* ---- Core dump ---- */

    /* Query /api/coredump/info and show the dump card only when a dump is saved. */
    function refreshCoredumpInfo(){
      var card=$('coredumpCard');
      if(!card) return;
      fetch('/api/coredump/info')
        .then(function(r){
          if(!r.ok) throw new Error('HTTP '+r.status);
          return r.json();
        })
        .then(function(d){
          if(d && d.present){
            var kb=Math.round((d.size||0)/1024);
            var info=$('coredumpInfo');
            if(info) info.textContent='Crash dump present ('+kb+' KB)';
            card.style.display='flex';
          } else {
            card.style.display='none';
          }
        })
        .catch(function(){ card.style.display='none'; });
    }

    function clearCoredump(){
      if(!confirm('Clear the saved crash dump? This cannot be undone.')) return;
      var btn=$('coredumpClearBtn');
      btn.disabled=true; var prev=btn.textContent; btn.textContent='Clearing...';
      fetch('/api/coredump/clear',{method:'POST'})
        .then(function(r){
          if(!r.ok) throw new Error('Clear failed');
          showToast('Crash dump cleared','success');
          refreshCoredumpInfo();
        })
        .catch(function(e){ showToast('Clear crash dump failed: '+e.message,'error'); })
        .finally(function(){ btn.disabled=false; btn.textContent=prev; });
    }

    /* ---- Backup & Restore ---- */

    var _backupData = null;  /* holds parsed backup JSON for confirm step */

    function downloadBackup() {
      var btn = $('backupDownloadBtn');
      btn.disabled = true; btn.textContent = 'Downloading...';
      var sensitive = $('backupIncludeSensitive').checked ? '1' : '0';
      fetch('/api/config/backup?include_sensitive=' + sensitive)
        .then(function(r) {
          if (!r.ok) throw new Error('Download failed');
          /* Get filename from Content-Disposition header */
          var cd = r.headers.get('Content-Disposition') || '';
          var match = cd.match(/filename="?([^"]+)"?/);
          var filename = match ? match[1] : 'config-backup.json';
          return r.blob().then(function(blob) { return {blob: blob, filename: filename}; });
        })
        .then(function(result) {
          var a = document.createElement('a');
          a.href = URL.createObjectURL(result.blob);
          a.download = result.filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(a.href);
          showToast('Backup downloaded', 'success');
        })
        .catch(function(e) { showToast('Backup failed: ' + e.message, 'error'); })
        .finally(function() { btn.disabled = false; btn.textContent = 'Download Backup'; });
    }

    function restoreFileSelected(input) {
      var label = $('restoreFileLabel');
      if (!input.files.length) {
        label.textContent = 'Choose backup .json file';
        label.classList.remove('has-file');
        label.appendChild(input);
        $('restorePreview').style.display = 'none';
        return;
      }
      label.textContent = input.files[0].name;
      label.classList.add('has-file');
      label.appendChild(input);

      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          _backupData = JSON.parse(e.target.result);
        } catch (err) {
          showToast('Invalid JSON file', 'error');
          return;
        }
        /* Send preview request */
        postJson('/api/config/restore', {backup: _backupData, confirm: false})
          .then(function(r) {
            if (!r.ok) return r.json().then(function(e) { throw new Error(e.error || 'Preview failed'); });
            return r.json();
          })
          .then(function(preview) { renderRestorePreview(preview); })
          .catch(function(e) { showToast('Preview failed: ' + e.message, 'error'); });
      };
      reader.readAsText(input.files[0]);
    }

    function renderRestorePreview(p) {
      if (p.error) {
        showToast(p.error, 'error');
        return;
      }

      $('restorePreview').style.display = 'block';

      /* Metadata */
      $('restoreHostname').textContent = p.backup_hostname || 'Unknown';
      $('restoreMac').textContent = p.backup_mac || '--';
      $('restoreFirmware').textContent = p.backup_firmware || '--';
      $('restoreDate').textContent = p.export_date || '--';

      /* Version warning banner */
      var banner = $('restoreWarningBanner');
      if (p.warnings && p.warnings.length > 0) {
        var color;
        if (p.version_match === 'exact')       color = {bg: 'rgba(16,185,129,0.08)', border: 'rgba(16,185,129,0.2)', text: '#10b981'};
        else if (p.version_match === 'newer')  color = {bg: 'rgba(245,158,11,0.08)', border: 'rgba(245,158,11,0.2)', text: '#f59e0b'};
        else if (p.version_match === 'much_older') color = {bg: 'rgba(239,68,68,0.08)', border: 'rgba(239,68,68,0.2)', text: '#ef4444'};
        else                                   color = {bg: 'rgba(245,158,11,0.08)', border: 'rgba(245,158,11,0.2)', text: '#f59e0b'};
        banner.style.background = color.bg;
        banner.style.border = '1px solid ' + color.border;
        banner.style.color = color.text;
        banner.style.display = 'block';
        banner.innerHTML = '<div style="margin-bottom:4px"><strong>Version: v' + p.backup_version + ' &rarr; v' + p.current_version + '</strong></div>' +
          p.warnings.map(function(w) { return '<div>' + w + '</div>'; }).join('');
      } else {
        banner.style.display = 'none';
      }

      /* Changes diff grouped by category */
      var changesDiv = $('restoreChanges');
      changesDiv.innerHTML = '';
      if (p.changes && p.total_changes > 0) {
        var cats = Object.keys(p.changes);
        cats.forEach(function(cat) {
          var items = p.changes[cat];
          if (!items || !items.length) return;
          var section = document.createElement('div');
          section.style.cssText = 'background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:14px 16px;margin-bottom:8px';
          var header = '<div style="font-size:0.85rem;font-weight:600;color:#f4f4f5;margin-bottom:8px;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'">' +
            cat + ' <span style="color:#71717a;font-weight:400">(' + items.length + ' change' + (items.length > 1 ? 's' : '') + ')</span></div>';
          var body = '<div>';
          items.forEach(function(ch) {
            var fromStr = formatDiffValue(ch.from);
            var toStr = formatDiffValue(ch.to);
            body += '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:0.8rem;border-bottom:1px solid rgba(255,255,255,0.04)">' +
              '<span style="color:#a1a1aa">' + ch.label + '</span>' +
              '<span><span style="color:#71717a;text-decoration:line-through">' + fromStr + '</span> &rarr; <span style="color:var(--accent)">' + toStr + '</span></span>' +
              '</div>';
          });
          body += '</div>';
          section.innerHTML = header + body;
          changesDiv.appendChild(section);
        });
      }

      /* No changes categories */
      var noChanges = $('restoreNoChanges');
      if (p.no_changes && p.no_changes.length > 0) {
        noChanges.textContent = 'No changes: ' + p.no_changes.join(', ');
      } else {
        noChanges.textContent = '';
      }

      /* Missing fields */
      var missingDiv = $('restoreMissing');
      if (p.missing_fields && p.missing_fields.length > 0) {
        missingDiv.style.display = 'block';
        missingDiv.innerHTML = '<strong style="color:#f59e0b">Missing from backup:</strong> ' +
          p.missing_fields.map(escHtml).join(', ') + '<br><span style="color:#71717a">These settings will keep their current values.</span>';
      } else {
        missingDiv.style.display = 'none';
      }

      /* Unknown fields */
      var unknownDiv = $('restoreUnknown');
      if (p.unknown_fields && p.unknown_fields.length > 0) {
        unknownDiv.style.display = 'block';
        unknownDiv.innerHTML = '<strong style="color:#f59e0b">Unknown fields (from newer firmware):</strong> ' +
          p.unknown_fields.map(escHtml).join(', ') + '<br><span style="color:#71717a">These will be skipped.</span>';
      } else {
        unknownDiv.style.display = 'none';
      }

      /* Sensitive excluded */
      var sensDiv = $('restoreSensitive');
      if (!p.sensitive_included && p.sensitive_excluded && p.sensitive_excluded.length > 0) {
        sensDiv.style.display = 'block';
        sensDiv.innerHTML = '<strong>Sensitive fields not in backup:</strong> ' +
          p.sensitive_excluded.join(', ') + '<br>These will remain unchanged.';
      } else {
        sensDiv.style.display = 'none';
      }

      /* Validation notes (array of {severity, message}) */
      var valDiv = $('restoreValidation');
      var notes = p.validation_notes || [];
      var errs = [], warns = [];
      for (var i = 0; i < notes.length; i++) {
        var n = notes[i];
        if (n && n.severity === 'error') errs.push(n.message);
        else if (n) warns.push(n.message);
      }
      function escHtml(s) {
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;');
      }
      if (errs.length > 0 || warns.length > 0) {
        valDiv.style.display = 'block';
        var html = '';
        if (errs.length > 0) {
          html += '<strong style="color:#f87171">Problems that must be fixed:</strong><br>' +
            errs.map(escHtml).join('<br>');
        }
        if (warns.length > 0) {
          if (html) html += '<br><br>';
          html += '<strong style="color:#f59e0b">Adjusted values:</strong><br>' +
            warns.map(escHtml).join('<br>');
        }
        valDiv.innerHTML = html;
      } else {
        valDiv.style.display = 'none';
      }

      /* Update confirm button — block restore when there are hard errors */
      var rcBtn = $('restoreConfirmBtn');
      if (p.restore_blocked) {
        rcBtn.disabled = true;
        rcBtn.textContent = 'Resolve errors to restore';
      } else {
        rcBtn.disabled = false;
        rcBtn.textContent = 'Restore (' + p.total_changes + ' change' + (p.total_changes !== 1 ? 's' : '') + ')';
      }
    }

    function formatDiffValue(val) {
      if (val === null || val === undefined) return '(empty)';
      if (typeof val === 'boolean') return val ? 'On' : 'Off';
      if (typeof val === 'string' && val.length > 64) return val.substring(0, 61) + '...';
      return String(val);
    }

    function cancelRestore() {
      var input = $('restoreFileInput');
      input.value = '';
      $('restorePreview').style.display = 'none';
      $('restoreFileLabel').textContent = 'Choose backup .json file';
      $('restoreFileLabel').classList.remove('has-file');
      $('restoreFileLabel').appendChild(input);
      var rcBtn = $('restoreConfirmBtn');
      if (rcBtn) { rcBtn.disabled = false; rcBtn.textContent = 'Restore'; }
      _backupData = null;
    }

    function confirmRestore() {
      if (!_backupData) return;
      var btn = $('restoreConfirmBtn');
      if (btn.disabled) return;  /* blocked by validation errors */
      btn.disabled = true; btn.textContent = 'Restoring...';

      postJson('/api/config/restore', {backup: _backupData, confirm: true})
        .then(function(r) {
          if (!r.ok) return r.json().then(function(e) { throw new Error(e.error || 'Restore failed'); });
          return r.json();
        })
        .then(function(result) {
          showToast('Configuration restored successfully', 'success');
          _backupData = null;
          /* Reload config and reset UI after short delay */
          setTimeout(function() { loadConfig(); cancelRestore(); }, 500);
        })
        .catch(function(e) {
          showToast('Restore failed: ' + e.message, 'error');
        })
        .finally(function() {
          btn.disabled = false; btn.textContent = 'Restore';
        });
    }

    /* === Init === */
    /* Start /api/pages at t=0 in parallel with /api/config; populateConfig
       awaits this same cached promise instead of starting it after config. */
    fetchPageRegistry();
    /* Defer version load and the 5s status poller until after config is populated,
       so they don't fire onto the device's few httpd workers mid-load. The GitHub
       update check (~7s) runs once in the background, lightly delayed, after that
       work so the badge populates on every tab without opening System. */
    loadConfig().then(function(){
      loadVersion();
      refreshNavMetrics();
      setInterval(refreshNavMetrics, 5000);
      setTimeout(function(){
        if(!window._updateChecked && typeof checkUpdateBadge==='function'){ window._updateChecked=true; checkUpdateBadge(); }
      }, 1500);
      /* Quietly fetch the remaining tab fragments one at a time so later tab
         clicks open instantly. Waits for browser idle time (2s fallback);
         chains through the same one-at-a-time fragment queue as user clicks. */
      setTimeout(startTabPrefetch, 2000);
    });
  </script>
</body>
</html>
