name: Build Firmware

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

env:
  IDF_VERSION: v5.5.2
  IDF_TARGET: esp32p4
  CCACHE_DIR: /opt/actions-runner-esp32/.ccache
  CCACHE_MAXSIZE: 1G
  CCACHE_COMPRESSLEVEL: 6

permissions:
  contents: write

jobs:
  check-changes:
    name: Check Changed Paths
    runs-on: ubuntu-latest
    outputs:
      has_code_changes: ${{ steps.filter.outputs.has_code_changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if code files changed
        id: filter
        run: |
          # A manual run (workflow_dispatch) always builds; github.event.before is
          # unset there, so short-circuit before the diff to avoid an empty BASE.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_code_changes=true" >> $GITHUB_OUTPUT
            echo "Manual run requested, build will run"
            exit 0
          fi
          BASE=${{ github.event.before }}
          HEAD=${{ github.sha }}
          CODE_CHANGES=$(git diff --name-only "$BASE" "$HEAD" -- \
            ':!**/*.md' ':!docs/**' ':!images/**' ':!tests/**' ':!LICENSE' ':!.gitignore' ':!.github/workflows/**' \
            | head -1)

          if [ -n "$CODE_CHANGES" ]; then
            echo "has_code_changes=true" >> $GITHUB_OUTPUT
            echo "Code changes detected, build will run"
          else
            echo "has_code_changes=false" >> $GITHUB_OUTPUT
            echo "Only docs/workflow/non-code changes, skipping build"
          fi

  build:
    needs: check-changes
    if: needs.check-changes.outputs.has_code_changes == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false

      - name: Check for skip CI
        id: check_skip
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qi '\[skip ci\]'; then
            echo "Skipping CI due to [skip ci] in commit message"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Read version
        if: steps.check_skip.outputs.skip != 'true'
        id: version
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH=${GITHUB_REF_NAME//\//-}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Determine tag
        if: steps.check_skip.outputs.skip != 'true'
        id: tag
        run: |
          BRANCH=${GITHUB_REF_NAME}

          if [ "$BRANCH" = "main" ]; then
            VERSION=$(cat version.txt | tr -d '[:space:]')
            TAG="v${VERSION}"
          else
            # Make the local tag set authoritative: pull every tag created by
            # prior release runs (a shallow/persistent runner workspace otherwise
            # lags the remote, which previously caused the number to collide and
            # silently clobber an existing pre-release).
            git fetch --force --tags origin

            # Use latest main release version so pre-releases sort correctly
            LATEST_MAIN_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -v '-' | head -1)
            if [ -n "$LATEST_MAIN_TAG" ]; then
              BASE_VERSION=${LATEST_MAIN_TAG#v}
            else
              BASE_VERSION=$(cat version.txt | tr -d '[:space:]')
            fi

            # Next number = highest existing dev.N + 1 (use the max, not a count,
            # so gaps from deleted/withdrawn tags never cause a reuse), then skip
            # any number whose tag already exists as a final race/lag safeguard.
            PREFIX="v${BASE_VERSION}-${BRANCH}."
            LAST=$(git tag -l "${PREFIX}*" | sed "s|^${PREFIX}||" | grep -E '^[0-9]+$' | sort -n | tail -1)
            NEXT=$(( ${LAST:-0} + 1 ))
            TAG="${PREFIX}${NEXT}"
            while git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null 2>&1; do
              NEXT=$(( NEXT + 1 ))
              TAG="${PREFIX}${NEXT}"
            done
          fi

          # Force the build to embed THIS tag (build runs before the tag is
          # created at release time, so git describe alone would lag by one).
          echo "BUILD_GIT_TAG_OVERRIDE=$TAG" >> $GITHUB_ENV

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          if [ "$BRANCH" = "main" ]; then
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Set ESP-IDF paths
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          echo "IDF_PATH=$HOME/esp/esp-idf" >> $GITHUB_ENV
          echo "IDF_TOOLS_PATH=$HOME/esp/tools" >> $GITHUB_ENV

      - name: Ensure ESP-IDF ${{ env.IDF_VERSION }} is installed
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          # Check if ESP-IDF is already installed and at the correct version
          if [ -f "$IDF_PATH/export.sh" ]; then
            INSTALLED_VERSION=$(git -C "$IDF_PATH" describe --tags --exact-match 2>/dev/null || echo "")
            if [ -z "$INSTALLED_VERSION" ] && [ -f "$IDF_PATH/version.txt" ]; then
              INSTALLED_VERSION="v$(cat "$IDF_PATH/version.txt" | tr -d '[:space:]')"
            fi
            echo "ESP-IDF found: ${INSTALLED_VERSION:-unknown}"
            if [ "$INSTALLED_VERSION" = "$IDF_VERSION" ]; then
              echo "Correct version already installed. Skipping."
              exit 0
            else
              echo "Version mismatch ($INSTALLED_VERSION != $IDF_VERSION). Reinstalling..."
              rm -rf "$IDF_PATH"
              rm -rf "$IDF_TOOLS_PATH"
            fi
          fi

          echo "Installing ESP-IDF $IDF_VERSION..."

          echo "::group::Clone ESP-IDF $IDF_VERSION"
          mkdir -p "$(dirname "$IDF_PATH")" "$(dirname "$IDF_TOOLS_PATH")"
          git clone --branch "$IDF_VERSION" --depth 1 --recursive \
            https://github.com/espressif/esp-idf.git "$IDF_PATH"
          echo "::endgroup::"

          echo "::group::Install ESP-IDF tools for $IDF_TARGET"
          "$IDF_PATH/install.sh" "$IDF_TARGET"
          echo "::endgroup::"

          echo "ESP-IDF $IDF_VERSION installation complete."

      - name: Setup ESP-IDF environment
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          . $IDF_PATH/export.sh
          echo "IDF version: $(idf.py --version)"

      - name: Setup ccache
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          # Install ccache if not present
          if ! command -v ccache &>/dev/null; then
            echo "Installing ccache..."
            sudo apt-get update -qq && sudo apt-get install -y -qq ccache
          fi
          echo "ccache version: $(ccache --version | head -1)"
          ccache --zero-stats
          ccache --show-config | grep -E "max_size|cache_dir|compression"

      - name: Clean build state (always rebuild config)
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          # Decide whether managed_components also needs purging BEFORE removing
          # build/, since the comparison hash lives in build/.build_config_hash.
          NEEDS_DEPS_CLEAN=false
          if [ -f build/.build_config_hash ]; then
            OLD_HASH=$(cat build/.build_config_hash)
            NEW_HASH=$(cat sdkconfig.defaults main/idf_component.yml main/CMakeLists.txt CMakeLists.txt dependencies.lock 2>/dev/null | sha256sum | cut -d' ' -f1)
            if [ "$OLD_HASH" != "$NEW_HASH" ]; then
              echo "Build config changed, will also purge managed_components"
              NEEDS_DEPS_CLEAN=true
            fi
          else
            echo "No previous successful build hash found, will also purge managed_components"
            NEEDS_DEPS_CLEAN=true
          fi

          # Always purge build/ and sdkconfig: a stale sdkconfig selects the wrong
          # display pipeline and a stale build/ keeps a stale build_version.h and
          # object files. ccache (separate CCACHE_DIR) is untouched, so recompiles
          # stay fast.
          rm -rf build sdkconfig
          echo "Removed build and sdkconfig"

          # Only re-download managed_components when the dependency/config hash
          # changed: it is pinned by dependencies.lock, and re-fetching from the
          # component registry every run adds a network failure point.
          if [ "$NEEDS_DEPS_CLEAN" = "true" ]; then
            rm -rf managed_components
            echo "Removed managed_components"
          else
            echo "Config unchanged, reusing managed_components"
          fi

      - name: Build project
        if: steps.check_skip.outputs.skip != 'true'
        env:
          IDF_CCACHE_ENABLE: 1
        run: |
          . $IDF_PATH/export.sh
          idf.py build

      - name: Save build config hash
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          cat sdkconfig.defaults main/idf_component.yml main/CMakeLists.txt CMakeLists.txt dependencies.lock 2>/dev/null | sha256sum | cut -d' ' -f1 > build/.build_config_hash

      - name: Show ccache stats
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          ccache --show-stats

      - name: Generate firmware binaries
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          . $IDF_PATH/export.sh
          mkdir -p firmware

          # Detect app binary from project_description.json
          APP_BIN=$(python3 -c "
          import json
          with open('build/project_description.json') as f:
              d = json.load(f)
          print('build/' + d['app_bin'])
          ")

          # Merge factory binary (bootloader + partition table + app)
          python3 -m esptool --chip esp32p4 merge_bin \
            --flash_mode dio \
            --flash_size 32MB \
            --flash_freq 80m \
            -o firmware/nina-display-factory.bin \
            0x2000  build/bootloader/bootloader.bin \
            0x8000  build/partition_table/partition-table.bin \
            0x20000 "$APP_BIN"

          # Copy app binary as OTA file
          cp "$APP_BIN" firmware/nina-display-ota.bin

          # Keep bootloader + partition table on disk (build/ tree) so the erase
          # check can hash them. They are NOT uploaded as release assets anymore:
          # the OTA-safe vs full-erase baseline is carried as SHA256 markers in the
          # release body (see "Check full erase requirement" / "Generate release
          # notes"). Staging copies kept for local inspection only.
          cp build/bootloader/bootloader.bin firmware/bootloader.bin
          cp build/partition_table/partition-table.bin firmware/partition-table.bin

          # Copy ELF for crash backtrace decoding
          APP_ELF=$(python3 -c "
          import json
          with open('build/project_description.json') as f:
              d = json.load(f)
          print('build/' + d['app_elf'])
          ")
          cp "$APP_ELF" firmware/nina-display.elf

          # Report sizes
          echo "Factory: $(du -h firmware/nina-display-factory.bin | cut -f1)"
          echo "OTA:     $(du -h firmware/nina-display-ota.bin | cut -f1)"

      - name: Extract firmware metrics
        if: steps.check_skip.outputs.skip != 'true'
        id: metrics
        run: |
          . $IDF_PATH/export.sh
          
          # Get binary sizes
          FACTORY_SIZE=$(stat -c%s firmware/nina-display-factory.bin 2>/dev/null || stat -f%z firmware/nina-display-factory.bin)
          OTA_SIZE=$(stat -c%s firmware/nina-display-ota.bin 2>/dev/null || stat -f%z firmware/nina-display-ota.bin)
          
          # Convert to human readable using Python (bc not available on all runners)
          FACTORY_MB=$(python3 -c "print(f'{$FACTORY_SIZE / 1024 / 1024:.2f}')")
          OTA_MB=$(python3 -c "print(f'{$OTA_SIZE / 1024 / 1024:.2f}')")
          
          # Extract PSRAM config from sdkconfig (exact key match to avoid multi-line grep)
          PSRAM_SPEED=$(grep '^CONFIG_SPIRAM_SPEED=' sdkconfig 2>/dev/null | cut -d'=' -f2 || echo "200")

          # Get flash size from sdkconfig (exact key match)
          FLASH_SIZE=$(grep '^CONFIG_ESPTOOLPY_FLASHSIZE=' sdkconfig | cut -d'"' -f2 || echo "32MB")
          
          # Get memory usage from size output
          if [ -f build/nina-display.map ]; then
            DRAM_USED=$(grep -A 10 "Memory region.*Used Size" build/nina-display.map | grep "dram0" | awk '{print $2}' || echo "0")
            IRAM_USED=$(grep -A 10 "Memory region.*Used Size" build/nina-display.map | grep "iram0" | awk '{print $2}' || echo "0")
          else
            DRAM_USED="N/A"
            IRAM_USED="N/A"
          fi
          
          # Create metrics JSON
          cat > /tmp/firmware-metrics.json << EOF
          {
            "flash_size": "$FLASH_SIZE",
            "psram": "32MB @ ${PSRAM_SPEED}MHz",
            "factory_size": "${FACTORY_MB} MB",
            "ota_size": "${OTA_MB} MB",
            "dram_used": "$DRAM_USED",
            "iram_used": "$IRAM_USED",
            "esp_idf": "${{ env.IDF_VERSION }}",
            "target": "${{ env.IDF_TARGET }}",
            "build_date": "$(date -u +%Y-%m-%d)",
            "branch": "${GITHUB_REF_NAME}",
            "commit": "${{ steps.version.outputs.short_sha }}"
          }
          EOF
          
          cat /tmp/firmware-metrics.json
          
          echo "factory_mb=$FACTORY_MB" >> $GITHUB_OUTPUT
          echo "ota_mb=$OTA_MB" >> $GITHUB_OUTPUT

      - name: Update badge metrics
        if: steps.check_skip.outputs.skip != 'true' && github.ref == 'refs/heads/main'
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Store current state
          CURRENT_BRANCH=${GITHUB_REF_NAME}
          CURRENT_COMMIT=$(git rev-parse HEAD)

          # Stash any working tree changes (e.g. firmware binaries from build)
          git stash --include-untracked

          # Fetch badges branch if it exists, or create orphan
          git fetch origin badges:badges 2>/dev/null || git checkout --orphan badges

          # Switch to badges branch
          if git show-ref --verify --quiet refs/heads/badges; then
            git checkout badges
          fi
          
          # Clean all except .git
          git rm -rf . 2>/dev/null || true
          
          # Copy metrics file
          cp /tmp/firmware-metrics.json .
          
          # Commit and push
          git add firmware-metrics.json
          if git commit -m "Update firmware metrics for ${{ steps.version.outputs.short_sha }}"; then
            git push origin badges --force
          fi
          
          # Return to original state
          git checkout $CURRENT_COMMIT
          git checkout $CURRENT_BRANCH
          git stash pop 2>/dev/null || true

      - name: Upload firmware artifacts
        if: steps.check_skip.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.version.outputs.branch }}-${{ steps.version.outputs.short_sha }}
          path: firmware/
          retention-days: 30

      - name: Generate changelog
        if: steps.check_skip.outputs.skip != 'true'
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          # Filter out noise commits (version bumps, skip ci)
          echo "$CHANGES" | grep -v '\[skip ci\]' | grep -v 'chore: bump version' > /tmp/changelog.txt || true
          # Keep unfiltered as fallback
          echo "$CHANGES" > /tmp/changelog_raw.txt
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Summarize release changes with Gemini
        if: steps.check_skip.outputs.skip != 'true'
        id: release_summary
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          set +e

          CHANGES=$(cat /tmp/changelog.txt)

          # Skip if no meaningful changes or no API key
          if [ -z "$CHANGES" ] || [ -z "$GOOGLE_API_KEY" ]; then
            echo "ai_available=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Use python3 for JSON handling (jq not available on self-hosted runner)
          python3 << 'PYEOF'
          import json, os, re, subprocess, sys

          with open('/tmp/changelog.txt') as f:
              changes = f.read().strip()

          api_key = os.environ.get('GOOGLE_API_KEY', '')
          if not changes or not api_key:
              print("No changes or API key, skipping")
              sys.exit(0)

          prompt = """You are writing release notes for an ESP32 astrophotography display firmware. Given the commit list below, produce TWO things:

          1. A SUMMARY: 1-2 sentences in plain language describing what changed in this release and why it matters to users. Focus on user-visible impact.

          2. A CHANGES list: One line per commit in this exact format:
          - <plain language description of what the commit does> — <hash>

          Rules for the CHANGES list:
          - Each line must end with the original commit hash after a " — " separator
          - Rewrite the commit message into clear, plain language (drop prefixes like "feat:", "fix:", "bugfix:")
          - Focus on WHAT changed and WHY, not implementation details
          - Keep each line under 100 characters (excluding the hash)
          - Do NOT add, remove, or merge commits — output exactly one line per input commit
          - Do NOT use emojis

          Writing style — write like a developer, NOT like AI marketing copy:
          - NEVER use: "introduces", "enhances", "leverages", "utilizes", "facilitates", "ensures", "enables", "allows"
          - NEVER use: "This release..." to start the summary
          - Use direct, active voice: "Fixed X", "Added Y", "Screen now does Z"
          - Good: "Fixed remaining time calculation being off by one exposure"
          - Bad: "Resolved an issue where the target remaining time was calculated incorrectly"

          ## Commits
          """ + changes + """

          ## Output format (follow exactly)
          SUMMARY: <your summary here>

          CHANGES:
          - <description> — <hash>
          - <description> — <hash>"""

          payload = json.dumps({
              "contents": [{"parts": [{"text": prompt}]}],
              "generationConfig": {"temperature": 0.3, "maxOutputTokens": 4096}
          })

          try:
              result = subprocess.run(
                  ["curl", "-s", "-X", "POST",
                   "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent",
                   "-H", "Content-Type: application/json",
                   "-H", f"X-goog-api-key: {api_key}",
                   "-d", payload],
                  capture_output=True, text=True, timeout=30
              )
              response = json.loads(result.stdout)
              full_text = response["candidates"][0]["content"]["parts"][0]["text"]
          except Exception as e:
              print(f"AI summary failed: {e}")
              sys.exit(0)

          # Extract summary line
          summary_match = re.search(r'^SUMMARY:\s*(.+)$', full_text, re.MULTILINE)
          # Extract changes (everything after CHANGES: line)
          changes_match = re.search(r'^CHANGES:\s*\n([\s\S]+)', full_text, re.MULTILINE)

          if summary_match and changes_match:
              with open('/tmp/release_summary.txt', 'w') as f:
                  f.write(summary_match.group(1).strip())
              with open('/tmp/release_changes.txt', 'w') as f:
                  f.write(changes_match.group(1).strip())
              # Signal success via a marker file
              with open('/tmp/ai_available', 'w') as f:
                  f.write('true')
              print("AI summary generated successfully")
          else:
              print("Could not parse AI response")
          PYEOF

          if [ -f /tmp/ai_available ]; then
            echo "ai_available=true" >> $GITHUB_OUTPUT
          else
            echo "ai_available=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for network_adapter.bin
        if: steps.check_skip.outputs.skip != 'true'
        id: network_adapter
        run: |
          if [ -f "network_adapter.bin" ]; then
            cp network_adapter.bin firmware/
            echo "included=true" >> $GITHUB_OUTPUT
          else
            echo "included=false" >> $GITHUB_OUTPUT
          fi

      - name: Check full erase requirement
        if: steps.check_skip.outputs.skip != 'true'
        id: erase_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Detection is artifact-primary: hash the freshly built partition table
          # and bootloader, then compare against the previous same-lineage
          # release's SHA256 markers carried in its release body (no bin assets
          # are downloaded). The source-diff rules below are SECONDARY
          # corroboration. Bias toward false-positive (require erase) over
          # false-negative (silent OTA-break).
          REASONS=""
          REQUIRED=false

          # Find previous release tag to diff/compare against.
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          # --- PRIMARY: built-artifact hash vs previous release body markers ---
          # Freshly built hashes (also re-emitted into THIS release's body by the
          # release-notes step so the next run can read them).
          NEW_PT="build/partition_table/partition-table.bin"
          NEW_BL="build/bootloader/bootloader.bin"
          PT_SHA=$(sha256sum "$NEW_PT" | cut -d' ' -f1)
          BL_SHA=$(sha256sum "$NEW_BL" | cut -d' ' -f1)

          if [ -z "$PREV_TAG" ]; then
            # First release ever: no baseline to compare. Cannot prove OTA-safe.
            REASONS="${REASONS}No previous release baseline to compare; flash factory binary.\n"
            REQUIRED=true
          else
            # Read the previous release body and pull out its hash markers.
            # Tolerate failure: prev release may be missing or predate this scheme.
            PREV_BODY=$(gh release view "$PREV_TAG" --json body -q .body 2>/dev/null || true)
            OLD_PT_SHA=$(echo "$PREV_BODY" | grep -oE 'nina:pt_sha=[0-9a-f]+' | head -1 | sed 's/.*nina:pt_sha=//')
            OLD_BL_SHA=$(echo "$PREV_BODY" | grep -oE 'nina:bl_sha=[0-9a-f]+' | head -1 | sed 's/.*nina:bl_sha=//')

            if [ -z "$OLD_PT_SHA" ]; then
              # Previous release predates this marker scheme (or body unreadable).
              REASONS="${REASONS}No previous release baseline to compare; flash factory binary.\n"
              REQUIRED=true
            else
              if [ "$PT_SHA" != "$OLD_PT_SHA" ]; then
                REASONS="${REASONS}Partition table changed since ${PREV_TAG}.\n"
                REQUIRED=true
              fi

              if [ "$BL_SHA" != "$OLD_BL_SHA" ]; then
                # A bootloader hash change is flagged. Prefer safety: treat as
                # required and recommend a manual factory flash.
                REASONS="${REASONS}Bootloader changed since ${PREV_TAG} (manual flash recommended).\n"
                REQUIRED=true
              fi
            fi
          fi

          # --- SECONDARY: source-diff corroboration (resolved sdkconfig) -------
          # Diff the resolved/generated sdkconfig (build product), not
          # sdkconfig.defaults, so it reflects what was actually built.
          if [ -n "$PREV_TAG" ]; then
            # 1. Partition table CSV changed (offsets, sizes, new/removed parts).
            PARTITION_DIFF=$(git diff "$PREV_TAG" -- partitions.csv 2>/dev/null | grep '^[+-]' | grep -v '^[+-][+-][+-]' | sed 's/^[+-]//' | tr -s ' ,' ' ' || true)
            if [ -n "$PARTITION_DIFF" ]; then
              CHANGED_PARTS=$(echo "$PARTITION_DIFF" | awk '{print $1}' | sort -u | paste -sd ', ')
              REASONS="${REASONS}Partition layout (partitions.csv) changed since ${PREV_TAG} (affected: ${CHANGED_PARTS}).\n"
              REQUIRED=true
            fi

            # 2. Security / target / MMU / partition-offset keys in the RESOLVED
            #    sdkconfig. Match only ENABLE/value symbols that actually force a
            #    full erase. Deliberately excludes:
            #      - CONFIG_BOOTLOADER_* prefix (matches log level etc.)
            #      - *_SUPPORTED capability flags
            #      - FLASHMODE/FLASHFREQ/FLASHSIZE (app header reconfigures flash
            #        at boot; these are OTA-safe)
            RESOLVED_SDKCONFIG=""
            if [ -f sdkconfig ]; then
              RESOLVED_SDKCONFIG="sdkconfig"
            elif [ -f build/config/sdkconfig.json ]; then
              RESOLVED_SDKCONFIG="build/config/sdkconfig.json"
            fi
            WATCH_KEYS='^(CONFIG_SECURE_BOOT=y|CONFIG_SECURE_BOOT_ENABLED=y|CONFIG_SECURE_FLASH_ENC_ENABLED=y|CONFIG_FLASH_ENCRYPTION_ENABLED=y|CONFIG_IDF_TARGET=|CONFIG_MMU_PAGE_SIZE|CONFIG_PARTITION_TABLE_OFFSET=|CONFIG_PARTITION_TABLE_MD5)'
            if [ -n "$RESOLVED_SDKCONFIG" ] && [ "$RESOLVED_SDKCONFIG" = "sdkconfig" ]; then
              OLD_SDKCONFIG=$(git show "$PREV_TAG":sdkconfig 2>/dev/null || true)
              if [ -n "$OLD_SDKCONFIG" ]; then
                OLD_WATCH=$(echo "$OLD_SDKCONFIG" | grep -E "$WATCH_KEYS" | sort || true)
                NEW_WATCH=$(grep -E "$WATCH_KEYS" sdkconfig | sort || true)
                if [ "$OLD_WATCH" != "$NEW_WATCH" ]; then
                  CHANGED_KEYS=$( (echo "$OLD_WATCH"; echo "$NEW_WATCH") | grep -oE 'CONFIG_[A-Z0-9_]+' | sort -u | paste -sd ', ')
                  REASONS="${REASONS}Security/target/MMU config changed since ${PREV_TAG} (${CHANGED_KEYS}).\n"
                  REQUIRED=true
                fi
              fi
            fi

            # 3. NVS namespace renamed in app_config.c. Fires only when the string
            #    literal defining the namespace changes.
            OLD_NS=$(git show "$PREV_TAG":main/app_config.c 2>/dev/null | sed -n 's/.*NVS_NAMESPACE *= *"\([^"]*\)".*/\1/p' | head -1 || true)
            NEW_NS=$(sed -n 's/.*NVS_NAMESPACE *= *"\([^"]*\)".*/\1/p' main/app_config.c | head -1 || true)
            if [ -n "$OLD_NS" ] && [ -n "$NEW_NS" ] && [ "$OLD_NS" != "$NEW_NS" ]; then
              REASONS="${REASONS}NVS namespace changed: \"${OLD_NS}\" -> \"${NEW_NS}\" in app_config.c.\n"
              REQUIRED=true
            fi
          fi

          # --- Manual override — FULL_ERASE_REQUIRED file always wins ----------
          if [ -f "FULL_ERASE_REQUIRED" ]; then
            MANUAL_REASON=$(cat FULL_ERASE_REQUIRED | tr -d '\r' | head -5)
            REASONS="${REASONS}${MANUAL_REASON}\n"
            REQUIRED=true
          fi

          # Hashes of the freshly built baseline. The release-notes step emits
          # these into THIS release's body as nina:pt_sha / nina:bl_sha markers
          # so the next run can read them back (always present, both verdicts).
          echo "pt_sha=$PT_SHA" >> $GITHUB_OUTPUT
          echo "bl_sha=$BL_SHA" >> $GITHUB_OUTPUT

          # --- Full-erase floor (per-channel carry-forward) --------------------
          # The floor is the newest release of THIS channel (stable vs
          # pre-release) that required a full erase. It is carried forward in
          # every release body so devices can decide erase-vs-OTA from the
          # newest release alone. PREV_TAG above (git describe) is fine for the
          # hash chain, but the floor must be read from the previous release of
          # the SAME channel, so look that up explicitly. Soft-fail throughout:
          # any lookup problem just means "no prior floor" — never fail the
          # build over the floor computation.
          THIS_TAG="${{ steps.tag.outputs.tag }}"
          IS_PRERELEASE="${{ steps.tag.outputs.is_prerelease }}"
          NEW_FLOOR=""
          if [ "$REQUIRED" = "true" ]; then
            NEW_FLOOR="$THIS_TAG"
            echo "Full-erase floor: $NEW_FLOOR (new this release)"
          else
            # Latest release of the same channel, excluding the rolling
            # snd-alpha tag and the tag being created by this run.
            PREV_CHANNEL_TAG=$(gh release list --limit 50 --json tagName,isPrerelease \
              -q "[.[] | select(.isPrerelease == ${IS_PRERELEASE}) | select(.tagName != \"snd-alpha\") | select(.tagName != \"${THIS_TAG}\")] | .[0].tagName" 2>/dev/null || true)
            if [ -n "$PREV_CHANNEL_TAG" ] && [ "$PREV_CHANNEL_TAG" != "null" ]; then
              PREV_CHANNEL_BODY=$(gh release view "$PREV_CHANNEL_TAG" --json body -q .body 2>/dev/null || true)
              NEW_FLOOR=$(echo "$PREV_CHANNEL_BODY" | grep -oE 'nina:full_erase_floor=[A-Za-z0-9._-]+' | head -1 | sed 's/.*nina:full_erase_floor=//')
            fi
            if [ -n "$NEW_FLOOR" ]; then
              echo "Full-erase floor: $NEW_FLOOR (carried forward from ${PREV_CHANNEL_TAG})"
            else
              echo "Full-erase floor: none (no prior floor found; marker omitted)"
            fi
          fi
          echo "erase_floor=$NEW_FLOOR" >> $GITHUB_OUTPUT

          if [ "$REQUIRED" = "true" ]; then
            echo "required=true" >> $GITHUB_OUTPUT
            echo "reason<<EOFR" >> $GITHUB_OUTPUT
            echo -e "$REASONS" | sed '/^$/d' >> $GITHUB_OUTPUT
            echo "EOFR" >> $GITHUB_OUTPUT
          else
            echo "required=false" >> $GITHUB_OUTPUT
            echo "reason=" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PREV_TAG="${{ steps.changelog.outputs.prev_tag }}"
          VERSION=$(cat version.txt | tr -d '[:space:]')
          BRANCH=${GITHUB_REF_NAME}
          FACTORY_MB="${{ steps.metrics.outputs.factory_mb }}"
          OTA_MB="${{ steps.metrics.outputs.ota_mb }}"
          FULL_ERASE="${{ steps.erase_check.outputs.required }}"
          ERASE_REASON="${{ steps.erase_check.outputs.reason }}"
          PT_SHA="${{ steps.erase_check.outputs.pt_sha }}"
          BL_SHA="${{ steps.erase_check.outputs.bl_sha }}"
          ERASE_FLOOR="${{ steps.erase_check.outputs.erase_floor }}"

          if [ -n "$PREV_TAG" ]; then
            COMPARE_URL="https://github.com/chvvkumar/ESP32-P4-NINA-Display/compare/${PREV_TAG}...${TAG}"
          else
            COMPARE_URL=""
          fi

          AI_AVAILABLE="${{ steps.release_summary.outputs.ai_available }}"
          export TAG PREV_TAG VERSION BRANCH COMPARE_URL FACTORY_MB OTA_MB AI_AVAILABLE FULL_ERASE ERASE_REASON PT_SHA BL_SHA ERASE_FLOOR
          python3 << 'PYEOF'
          import os, json
          tag = os.environ['TAG']
          prev_tag = os.environ.get('PREV_TAG', '')
          version = os.environ['VERSION']
          branch = os.environ['BRANCH']
          compare_url = os.environ.get('COMPARE_URL', '')
          factory_mb = os.environ.get('FACTORY_MB', 'N/A')
          ota_mb = os.environ.get('OTA_MB', 'N/A')
          ai_available = os.environ.get('AI_AVAILABLE', 'false') == 'true'
          full_erase = os.environ.get('FULL_ERASE', 'false') == 'true'
          erase_reason = os.environ.get('ERASE_REASON', '').strip()
          pt_sha = os.environ.get('PT_SHA', '').strip()
          bl_sha = os.environ.get('BL_SHA', '').strip()
          erase_floor = os.environ.get('ERASE_FLOOR', '').strip()

          # Load metrics if available
          try:
              with open('/tmp/firmware-metrics.json') as f:
                  metrics = json.load(f)
          except:
              metrics = {}

          # Load AI summary and changes if available, otherwise fall back to raw changelog
          summary = ''
          if ai_available:
              try:
                  with open('/tmp/release_summary.txt') as f:
                      summary = f.read().strip()
                  with open('/tmp/release_changes.txt') as f:
                      changes = f.read().strip()
              except:
                  ai_available = False

          if not ai_available:
              with open('/tmp/changelog.txt') as f:
                  changes = f.read().strip()

          since = f'### Changes since {prev_tag}' if prev_tag else '### Recent Changes'
          # Machine-readable verdict marker as the very first line, always present.
          # The device matches the substring "nina:full_erase=1" to require a USB
          # factory flash; "nina:full_erase=0" means OTA-safe. Emitted from the
          # same final verdict that drives the caution/OTA-safe block below.
          erase_marker = '<!-- nina:full_erase=1 -->' if full_erase else '<!-- nina:full_erase=0 -->'
          # Hidden baseline markers, always present (both verdicts). The NEXT
          # run reads these from this release's body to decide OTA-safe vs
          # full-erase by comparing freshly built hashes against them.
          pt_marker = f'<!-- nina:pt_sha={pt_sha} -->'
          bl_marker = f'<!-- nina:bl_sha={bl_sha} -->'
          lines = [
              erase_marker,
              pt_marker,
              bl_marker,
          ]
          # Per-channel full-erase floor: newest release of this channel that
          # required a full erase. Omitted entirely when no floor is known so
          # devices fall back to their legacy release-history walk.
          if erase_floor:
              lines.append(f'<!-- nina:full_erase_floor={erase_floor} -->')
          lines += [
              f'## NINA Display {tag}',
              '',
              f'**Branch:** {branch}',
              f'**Version:** {version}',
              '**Built with:** ESP-IDF v5.5.2',
              '',
          ]

          # Full erase notice (prominent warning) or safe OTA note (subtle)
          if full_erase:
              lines += [
                  '> [!CAUTION]',
                  '> **FULL ERASE REQUIRED** — This release cannot be installed via OTA alone.',
                  '> You must flash the **factory binary** (`nina-display-factory.bin`) at address `0x0000`.',
                  f'> **Reason:** {erase_reason}' if erase_reason else '> Flash the factory binary to update.',
                  '',
              ]
          else:
              lines += [
                  '### \u2705 OTA Safe',
                  'This release can be installed via OTA update. No full erase needed.',
                  '',
              ]

          lines += [
              '### Build Specifications',
              f'- **Target:** {metrics.get("target", "esp32p4")}',
              f'- **Flash Size:** {metrics.get("flash_size", "32MB")}',
              f'- **PSRAM:** {metrics.get("psram", "32MB @ 200MHz")}',
              f'- **Factory Binary:** {factory_mb} MB',
              f'- **OTA Binary:** {ota_mb} MB',
              '',
          ]
          if summary:
              lines += ['### Summary', summary, '']
          lines += [since, changes, '']
          if compare_url:
              lines.append(f'**Full Changelog**: {compare_url}')
              lines.append('')
          lines += [
              '### Firmware Files',
              '| File | Description |',
              '|------|-------------|',
              '| `nina-display-factory.bin` | Full factory image (flash at 0x0000) |',
              '| `nina-display-ota.bin` | OTA update binary (upload via web UI) |',
              '| `nina-display.elf` | Firmware ELF (for decoding core dumps) |',
              '',
              '### Flashing',
              '- **Factory:** Use [ESP Web Flasher](https://espressif.github.io/esptool-js/) — flash at address `0x0000`',
              '- **OTA:** Upload `nina-display-ota.bin` via the device web UI at `http://<device-ip>/`',
              '',
          ]
          with open('/tmp/release-notes.md', 'w') as f:
              f.write('\n'.join(lines))
          PYEOF

      - name: Create release
        if: steps.check_skip.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          IS_PRERELEASE=${{ steps.tag.outputs.is_prerelease }}

          PRERELEASE_FLAG=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # Create or move git tag to current commit
          git tag -f "$TAG"
          git push origin "$TAG" --force

          # Delete only a release for THIS exact tag (e.g. a re-run of the same
          # commit). Robust numbering above guarantees $TAG is otherwise fresh,
          # so this never clobbers a different commit's release.
          gh release delete "$TAG" --yes 2>/dev/null || true
          # --target pins the release (and a not-yet-existing tag) to the commit
          # actually built, so the tag can never point at the default branch.
          gh release create "$TAG" \
            firmware/nina-display-factory.bin \
            firmware/nina-display-ota.bin \
            firmware/nina-display.elf \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md \
            $PRERELEASE_FLAG

      - name: Cleanup old pre-releases
        if: steps.check_skip.outputs.skip != 'true' && steps.tag.outputs.is_prerelease == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_TAG="${{ steps.tag.outputs.tag }}"
          echo "Cleaning up old pre-releases (keeping latest 2)..."

          # List all pre-releases sorted newest first, skip the 2 most recent, delete the rest
          gh release list --limit 50 --json tagName,isPrerelease \
            -q '[.[] | select(.isPrerelease)] | .[2:] | .[].tagName' | \
          while read -r old_tag; do
            echo "Deleting old pre-release: $old_tag"
            gh release delete "$old_tag" --yes --cleanup-tag 2>/dev/null || true
          done

      - name: Bump version for next release
        if: steps.check_skip.outputs.skip != 'true' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_VERSION=$(cat version.txt | tr -d '[:space:]')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          echo "$NEW_VERSION" > version.txt
          echo "Bumped version: $CURRENT_VERSION -> $NEW_VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push origin main
